<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>🌸 Pronunciación💖</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="container">

    <h1>✨ Practica tu pronunciación ✨</h1>

    <!-- 👤 NOMBRE -->
    <input type="text" id="nombre" placeholder="Tu nombre">

    <!-- 🎚️ NIVELES -->
    <div class="nivel">
        <button onclick="seleccionarNivel('facil')">Fácil</button>
        <button onclick="seleccionarNivel('medio')">Medio</button>
        <button onclick="seleccionarNivel('dificil')">Difícil</button>
    </div>

    <!-- 💬 FRASE -->
    <div class="frase" id="frase">💬 Elige un nivel para comenzar</div>

    <!-- 🎤 BOTÓN -->
    <button onclick="grabarYEvaluar()" id="btnHablar">🎤 Hablar</button>

    <!-- 📊 RESULTADO -->
    <div id="resultado" class="resultado">Aquí verás tu resultado</div>

    <!-- 🏆 PODIO -->
    <h3>🏆 Podio de la pronunciación</h3>
    <div id="podio">Aún no hay resultados</div>

    <!-- 🔊 AUDIOS -->
    <audio id="audio-success" src="{{ url_for('static', filename='success.mp3') }}"></audio>
    <audio id="audio-error" src="{{ url_for('static', filename='error.mp3') }}"></audio>

</div>

<script>

let nivelSeleccionado = '';
let fraseActual = '';

function seleccionarNivel(nivel) {
    nivelSeleccionado = nivel;

    fetch('/frase', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `nivel=${nivel}`
    })
    .then(res => res.json())
    .then(data => {
        fraseActual = data.frase;
        document.getElementById('frase').innerText = fraseActual;
        document.getElementById('resultado').innerText = "💬 Ahora habla la frase!";
    });
}

async function grabarYEvaluar() {

    const nombre = document.getElementById("nombre").value || "Anónimo";

    if (!nivelSeleccionado) {
        alert("Elige primero un nivel 😊");
        return;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        alert("Tu navegador no soporta voz");
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = 'es-ES';

    document.getElementById('resultado').innerText = "🎤 Escuchando...";

    recognition.start();

    recognition.onresult = async (event) => {

        const dicho = event.results[0][0].transcript.toLowerCase();

        const response = await fetch('/evaluar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body:
                `frase=${encodeURIComponent(fraseActual)}` +
                `&dicho=${encodeURIComponent(dicho)}` +
                `&nombre=${encodeURIComponent(nombre)}`
        });

        const data = await response.json();

        let mensaje = `🗣️ Dijiste: ${data.dicho}\n📊 Precisión: ${data.porcentaje}%\n`;

        if (data.porcentaje > 85) {
            mensaje += "🌟 ¡Excelente!";
            document.getElementById('audio-success').play();
        } else if (data.porcentaje > 60) {
            mensaje += "👍 Bien, pero mejora";
        } else {
            mensaje += "🔁 Intenta otra vez";
            document.getElementById('audio-error').play();
        }

        document.getElementById('resultado').innerText = mensaje;

        // 🏆 PODIO
        let podioHTML = "<h4>Top 3</h4>";

        data.top3.forEach((p, i) => {
            podioHTML += `${i+1}. ${p[0]} - ${p[1]}%<br>`;
        });

        document.getElementById('podio').innerHTML = podioHTML;
    };

    recognition.onerror = () => {
        document.getElementById('resultado').innerText = "❌ Error de voz";
    };
}

</script>

</body>
</html>
